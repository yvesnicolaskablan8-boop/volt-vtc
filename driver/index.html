<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pilote Chauffeur">

  <title>Pilote Chauffeur</title>

  <link rel="manifest" href="/driver/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/driver/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/driver/icons/icon-192.png">

  <script>
  (function(){
    [['volt_driver_version','pilote_driver_version'],['volt_driver_token','pilote_driver_token'],['volt_driver_user','pilote_driver_user'],['volt_driver_chauffeur','pilote_driver_chauffeur']].forEach(function(m){
      var o=localStorage.getItem(m[0]);if(o&&!localStorage.getItem(m[1])){localStorage.setItem(m[1],o);}localStorage.removeItem(m[0]);
    });
  })();
  </script>

  <!-- Force SW + cache update -->
  <script>
  (function(){
    var APP_VERSION = 17;
    var stored = parseInt(localStorage.getItem('pilote_driver_version') || '0');
    if (stored < APP_VERSION && 'serviceWorker' in navigator) {
      localStorage.setItem('pilote_driver_version', APP_VERSION);
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var p = regs.map(function(r) { return r.unregister(); });
        return Promise.all(p);
      }).then(function() {
        return caches.keys();
      }).then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      }).then(function() {
        window.location.reload(true);
      });
    }
  })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Leaflet (cartes trajets) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Iconify (modern icons) -->
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/driver/css/driver.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-logo">
        <img src="/driver/icons/icon-192.png" alt="Pilote Chauffeur" class="login-brand-img">
        <div class="login-app-label">Chauffeur</div>
        <p class="login-subtitle">Connectez-vous avec votre numero et PIN</p>
      </div>

      <form id="login-form" class="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-tel">Numero de telephone</label>
          <div class="input-icon">
            <iconify-icon icon="solar:phone-bold-duotone" style="font-size:1.2rem"></iconify-icon>
            <input type="tel" id="login-tel" placeholder="07 00 00 00 00" required autocomplete="tel">
          </div>
        </div>

        <div class="form-group">
          <label for="login-pin">Code PIN</label>
          <div class="input-icon">
            <iconify-icon icon="solar:lock-password-bold-duotone" style="font-size:1.2rem"></iconify-icon>
            <input type="password" id="login-pin" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="****" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <span class="btn-text">Se connecter</span>
          <span class="btn-loading" style="display:none"><i class="fas fa-spinner fa-spin"></i> Connexion...</span>
        </button>

        <p class="login-help">Mot de passe oublie ?</p>
      </form>

      <div id="login-error" class="login-error" style="display:none"></div>

      <p class="login-version">Pilote v1.2.0 &bull; Propulse par Yango</p>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app-shell" class="app-shell" style="display:none">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <button id="btn-back" class="header-btn header-back" style="display:none" title="Retour">
          <iconify-icon icon="solar:alt-arrow-left-linear" style="font-size:1.25rem"></iconify-icon>
        </button>
        <h2 id="page-title">Accueil</h2>
      </div>
      <div class="header-actions">
        <button id="btn-install-pwa" class="header-btn" title="Installer l'application">
          <iconify-icon icon="solar:download-minimalistic-bold-duotone" style="font-size:1rem;"></iconify-icon> Installer
        </button>
        <button id="btn-notifications" class="header-btn notif-bell-btn" title="Notifications">
          <iconify-icon icon="solar:bell-bing-bold-duotone" style="font-size:1.25rem"></iconify-icon>
          <span id="notif-badge" class="notif-badge" style="display:none">0</span>
        </button>
        <button id="btn-refresh" class="header-btn" title="Actualiser">
          <iconify-icon icon="solar:refresh-bold-duotone" style="font-size:1.25rem"></iconify-icon>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="app-content" class="app-content">
      <!-- Pages rendered here -->
    </main>

    <!-- Bottom Navigation (4 tabs matching mockup) -->
    <nav class="bottom-nav" id="bottom-nav">
      <a href="#/accueil" class="nav-item active" data-route="accueil">
        <iconify-icon icon="solar:home-2-bold" class="nav-icon"></iconify-icon>
        <span>Accueil</span>
      </a>
      <a href="#/versements" class="nav-item" data-route="versements">
        <iconify-icon icon="solar:wallet-bold" class="nav-icon"></iconify-icon>
        <span>Finances</span>
      </a>
      <a href="#/messagerie" class="nav-item" data-route="messagerie">
        <iconify-icon icon="solar:chat-round-dots-bold" class="nav-icon"></iconify-icon>
        <span>Messages</span>
        <span class="msg-nav-badge" style="display:none">0</span>
      </a>
      <a href="#/profil" class="nav-item" data-route="profil">
        <iconify-icon icon="solar:user-circle-bold" class="nav-icon"></iconify-icon>
        <span>Profil</span>
      </a>
    </nav>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <!-- Scripts -->
  <script src="/driver/js/driver-store.js"></script>
  <script src="/driver/js/driver-behavior.js"></script>
  <script src="/driver/js/components/driver-toast.js"></script>
  <script src="/driver/js/components/driver-modal.js"></script>
  <script src="/driver/js/components/driver-nav.js"></script>
  <script src="/driver/js/components/driver-countdown.js"></script>
  <script src="/driver/js/pages/accueil.js"></script>
  <script src="/driver/js/pages/planning.js"></script>
  <script src="/driver/js/pages/versements.js"></script>
  <script src="/driver/js/pages/signalements.js"></script>
  <script src="/driver/js/pages/profil.js"></script>
  <script src="/driver/js/pages/notifications.js"></script>
  <script src="/driver/js/pages/messagerie.js"></script>
  <script src="/driver/js/pages/maintenance.js"></script>
  <script src="/driver/js/pages/etat-lieux.js"></script>
  <script src="/driver/js/pages/documents.js"></script>
  <script src="/driver/js/pages/support.js"></script>
  <script src="/driver/js/pages/trajets.js"></script>
  <script src="/driver/js/pages/checklist.js"></script>
  <script src="/driver/js/pages/classement.js"></script>
  <script src="/driver/js/pages/contraventions.js"></script>
  <script src="/driver/js/pages/contrat.js"></script>
  <script src="/driver/js/driver-auth.js"></script>
  <script src="/driver/js/driver-router.js"></script>
  <script src="/driver/js/driver-app.js"></script>
</body>
</html>
