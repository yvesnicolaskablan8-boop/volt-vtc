<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pilote Monitor</title>
  <link rel="icon" type="image/svg+xml" href="/monitor/favicon.svg">
  <link rel="manifest" href="/monitor/manifest.json">
  <meta name="theme-color" content="#dc2626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pilote Monitor">
  <link rel="apple-touch-icon" href="/monitor/assets/icon-192.png">

  <script>
  (function(){
    [['volt_monitor_version','pilote_monitor_version'],['volt_monitor_token','pilote_monitor_token'],['volt_monitor_session','pilote_monitor_session']].forEach(function(m){
      var o=localStorage.getItem(m[0]);if(o&&!localStorage.getItem(m[1])){localStorage.setItem(m[1],o);}localStorage.removeItem(m[0]);
    });
  })();
  </script>

  <!-- Version bump -->
  <script>
  (function(){
    var APP_VERSION = 10;
    var stored = parseInt(localStorage.getItem('pilote_monitor_version') || '0');
    if (stored < APP_VERSION && 'serviceWorker' in navigator) {
      localStorage.setItem('pilote_monitor_version', APP_VERSION);
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { if (r.scope.includes('/monitor')) r.unregister(); });
      });
      if (typeof caches !== 'undefined') {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { if (k.startsWith('volt-monitor-')) caches.delete(k); });
        });
      }
      if (stored > 0) location.reload(true);
    }
  })();
  </script>

  <!-- Fonts + Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="/monitor/css/monitor.css">

  <!-- Flash prevention -->
  <script>
    if (localStorage.getItem('pilote_monitor_token')) {
      document.documentElement.classList.add('has-token');
    }
  </script>
  <style>
    .has-token #monitor-login { display: none !important; }
    .has-token .monitor-app { display: flex !important; }
  </style>
</head>
<body>

  <!-- =================== LOGIN =================== -->
  <div id="monitor-login" class="monitor-login">
    <div class="login-card">
      <div class="login-logo">
        <img src="/monitor/assets/logo-pilote.svg" alt="Pilote Monitor" class="login-brand-img">
        <div class="logo-subtitle">Monitor</div>
      </div>
      <form id="login-form" class="login-form">
        <input type="email" id="login-email" class="login-input" placeholder="Email" required autocomplete="email">
        <input type="password" id="login-password" class="login-input" placeholder="Mot de passe" required autocomplete="current-password">
        <button type="submit" id="login-btn" class="login-btn">Se connecter</button>
      </form>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- =================== APP =================== -->
  <div id="monitor-app" class="monitor-app">
    <!-- Header -->
    <header class="monitor-header">
      <div class="header-brand">
        <img src="/monitor/assets/icon-monitor.svg" alt="Pilote Monitor" class="brand-logo">
        <span>Pilote Monitor</span>
      </div>
      <div class="header-actions">
        <div class="header-status">
          <span class="live-dot" id="live-dot"></span>
          <span id="last-update">--:--</span>
        </div>
        <button class="header-btn" id="btn-refresh" title="Actualiser">
          <iconify-icon icon="solar:refresh-bold-duotone"></iconify-icon>
        </button>
        <button class="header-btn" id="btn-theme" title="Mode sombre">
          <iconify-icon icon="solar:moon-bold-duotone" id="theme-icon"></iconify-icon>
        </button>
        <button class="header-btn" id="btn-logout" title="Deconnexion">
          <iconify-icon icon="solar:logout-2-bold-duotone"></iconify-icon>
        </button>
      </div>
    </header>

    <!-- Content -->
    <main id="monitor-content" class="monitor-content">
      <div class="monitor-loading">
        <iconify-icon icon="solar:refresh-bold-duotone"></iconify-icon>
        <span>Chargement...</span>
      </div>
    </main>
  </div>

  <!-- JS -->
  <script src="/monitor/js/monitor.js"></script>
</body>
</html>
